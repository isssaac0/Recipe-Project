<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Élan Cuisine</title>
  <link rel="stylesheet" href="CSS/login.css">
</head>

<body>

<canvas id="bg"></canvas>

<div class="login-container">

  <div class="brand">
    <h1>Élan Cuisine</h1>
    <p>Luxury Recipe Experience</p>
  </div>

  <div class="login-card">

    <h2>Welcome Back</h2>
    <p class="sub">Login to continue</p>

    <form id="loginForm">

      <input type="email" id="email" placeholder="Email" required>

      <input type="password" id="password" placeholder="Password" minlength="6" required>

      <button type="submit">Login</button>

    </form>

    <p id="msg"></p>
    <p class="sub" style="margin-top:18px;">
  New here?
  <a href="register.html" style="color:#d4af37; text-decoration:none;">
    Register here
  </a>
</p>

  </div>

</div>

<script src="JS/login.js"></script>
</body>
</html>
