<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Recipe Video | Élan Cuisine</title>
<link rel="stylesheet" href="CSS/style.css">
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#fff9f0,#f8ecd8,#fffdf8);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.video-box{
width:100%;
max-width:1100px;
background:#fff;
padding:24px;
border-radius:24px;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.top-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
gap:20px;
}

.top-row h1{
margin:0;
color:#b67a10;
font-size:30px;
}

.back-btn{
text-decoration:none;
padding:12px 18px;
background:#b67a10;
color:#fff;
border-radius:12px;
font-weight:700;
}

.video-wrap{
position:relative;
padding-top:56.25%;
border-radius:18px;
overflow:hidden;
}

.video-wrap iframe{
position:absolute;
inset:0;
width:100%;
height:100%;
border:none;
}
</style>
</head>
<body>

<div class="video-box">

<div class="top-row">
<h1 id="recipeTitle">Recipe Video</h1>
<a href="index.html" class="back-btn">← Back</a>
</div>

<div class="video-wrap">
<iframe
id="player"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

</div>

<script>
const params = new URLSearchParams(location.search);

const title = params.get("title") || "Recipe Video";
const video = params.get("video") || "";

document.getElementById("recipeTitle").innerText = title;

function getEmbed(url){

if(url.includes("watch?v=")){
const id = url.split("watch?v=")[1].split("&")[0];
return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
}

if(url.includes("youtu.be/")){
const id = url.split("youtu.be/")[1].split("?")[0];
return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
}

return url;
}

document.getElementById("player").src = getEmbed(video);
</script>

</body>
</html>
